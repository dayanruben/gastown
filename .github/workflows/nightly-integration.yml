name: Nightly Integration Tests

on:
  schedule:
    - cron: '0 6 * * *' # 06:00 UTC daily
  workflow_dispatch: # Allow manual triggering

permissions:
  contents: read

jobs:
  integration-full:
    name: Full Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 70
    env:
      CMD_INTEGRATION_TESTS: ^Test(FreshInstallRigPolecatHookIntegration|HookShowShorthandResolvesToCanonical|RigAdd(CreatesCorrectStructure|RespectsDefaultAgent|InitializesBeads|UpdatesRoutes|UpdatesRigsJson|DerivesPrefix|CreatesRigConfig|WithUpstreamURL|CreatesAgentDirs|RejectsInvalidNames|CreatesAgentBeads|URLValidation)|Agent(BeadIDs|WorktreesStayClean)|Beads(DbInitAfterClone|RoutingFromTownRoot|RedirectResolution|CircularRedirectDetection|PrefixConflictDetection|ListFromPolecatDirectory|ListFromCrewDirectory|RoutesLoading|AppendRoute|RemoveRoute|GetPrefixForRig)|SlingCrossRig(RoutingResolution|UnknownPrefix)|Scheduler(CircuitBreakerExclusion|AutoConvoyCreation|BlockedStatusReporting|SlingDryRun|SlingContextIdempotency|SlingContextWorkBeadPristine|MultiRigDispatch|MultiRigEpicAutoResolve|ConvoyFlagRejection|EpicFlagRejection|EpicDetection|MixedBatchRejection|MultiRigConvoyAutoResolve|DisabledMode|DirectModeNoQueue|DeferredTaskWithoutRig|ConfigSetZero|DeferredNonRigRejection|DeferredAcceptsDogTarget|DirectEpicDispatch|BatchEpicRejection|InvalidJSONContextCleanup|ActualDispatchRoutesPollutedEnvToTargetRig|DispatchFailureRecordedInContextSourceDB|DirectConvoyDispatch)|ScheduleBead_(RefusesClosed|RefusesTombstone|ClosedForceDoesNotBypass)|HookSlot_(BasicHook|Singleton|Unhook|DifferentAgents|HookPersistence|StatusTransitions)|Role(HomeE2E|HomeMissingFlags|HomeCwdDetection|EnvCwdDetection|ListE2E|ShowE2E|ShowMismatch|ShowNoMismatchAtTownRoot|DetectE2E|DetectIgnoresGTRole|DetectInvalidPaths|EnvIncompleteEnvVars|EnvCwdMismatchFromIncompleteDir|HomeInvalidPaths))$
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.26'
          cache: true

      - name: Configure Git
        run: |
          git config --global user.name "CI Bot"
          git config --global user.email "ci@gastown.test"

      - name: Cache beads (bd)
        id: cache-beads
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/go/bin/bd
          key: beads-nightly-${{ hashFiles('.github/workflows/nightly-integration.yml') }}

      - name: Install beads (bd)
        if: steps.cache-beads.outputs.cache-hit != 'true'
        run: go install github.com/steveyegge/beads/cmd/bd@v1.0.5

      - name: Install Dolt
        run: |
          curl -sL https://github.com/dolthub/dolt/releases/download/v2.0.7/dolt-linux-amd64.tar.gz | tar xz
          mv dolt-linux-amd64/bin/dolt ~/go/bin/dolt

      - name: Pre-pull Dolt Docker image
        run: docker pull dolthub/dolt-sql-server:2.0.7

      - name: Add to PATH
        run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Configure Dolt
        run: |
          dolt config --global --add user.name "CI Bot"
          dolt config --global --add user.email "ci@gastown.test"

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Build
        run: go build -v ./cmd/gt

      - name: Run non-cmd integration tests
        run: |
          packages="$(go list -tags=integration ./... | grep -v '/internal/cmd$')"
          gotestsum --format testname --junitfile junit-non-cmd.xml -- -v -tags=integration -timeout=20m $packages

      - name: Run cmd integration tests
        run: gotestsum --format testname --junitfile junit-cmd.xml -- -v -tags=integration -run "$CMD_INTEGRATION_TESTS" -timeout=45m ./internal/cmd/...
